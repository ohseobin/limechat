<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lime Chat Pro</title>
    <style>
        body { font-family: sans-serif; background-color: #e5ddd5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; height: 95vh; background: white; display: flex; flex-direction: column; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 상단 바 */
        .header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .back-btn { cursor: pointer; display: none; margin-right: 10px; }

        /* 화면 전환용 섹션 */
        #auth-screen, #list-screen, #chat-screen { display: none; flex-direction: column; height: 100%; }

        /* 채팅방 목록 */
        .room-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .room-item:hover { background: #f5f5f5; }
        .room-icon { width: 45px; height: 45px; background: #ddd; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }

        /* 채팅창 */
        #messages { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; }
        .incoming { background: white; align-self: flex-start; }
        .outgoing { background: #dcf8c6; align-self: flex-end; }
        .img-msg { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        /* 하단 입력바 */
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input[type="text"] { flex: 1; border: none; padding: 10px; border-radius: 20px; outline: none; }
        .icon-btn { cursor: pointer; font-size: 20px; color: #555; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span class="back-btn" id="back-btn" onclick="showList()">←</span>
        <span id="header-title">Lime Chat</span>
    </div>

    <div id="auth-screen" style="display: flex; padding: 30px; text-align: center;">
        <h2 id="auth-title">로그인</h2>
        <div id="reg-fields" style="display:none;">
            <input type="text" id="name" placeholder="이름" style="width:100%; margin-bottom:10px; padding:10px;">
            <input type="number" id="num" placeholder="번호" style="width:100%; margin-bottom:10px; padding:10px;">
        </div>
        <input type="text" id="uid" placeholder="아이디" style="width:100%; margin-bottom:10px; padding:10px;">
        <input type="password" id="upw" placeholder="비밀번호" style="width:100%; margin-bottom:10px; padding:10px;">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:#25d366; color:white; border:none; border-radius:8px; font-weight:bold;">시작하기</button>
        <p onclick="toggleAuth()" style="font-size:13px; color:#075e54; cursor:pointer; margin-top:15px;">회원가입 하기</p>
    </div>

    <div id="list-screen">
        <div class="room-item" onclick="enterChat('6학년 6반 단톡방', 'group')">
            <div class="room-icon">👥</div>
            <div><strong>6학년 6반 단톡방</strong><br><small>모두와 대화하세요</small></div>
        </div>
        <div class="room-item" onclick="enterChat('선생님', '1:1')">
            <div class="room-icon">👤</div>
            <div><strong>선생님</strong><br><small>1:1 문의하기</small></div>
        </div>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <div class="input-bar">
            <label for="file-input" class="icon-btn">📎</label>
            <input type="file" id="file-input" accept="image/*" onchange="sendImage(event)">
            <input type="text" id="msg-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendText()">
            <span class="icon-btn" onclick="sendText()">▶</span>
        </div>
    </div>
</div>

<script>
    let isReg = false;
    let currentUser = "";

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('auth-title').innerText = isReg ? "회원가입" : "로그인";
        document.getElementById('reg-fields').style.display = isReg ? "block" : "none";
    }

    function handleAuth() {
        const id = document.getElementById('uid').value;
        const pw = document.getElementById('upw').value;
        if(isReg) {
            const name = document.getElementById('name').value;
            const num = document.getElementById('num').value;
            localStorage.setItem(id, JSON.stringify({pw, name, num}));
            alert("가입 성공!"); toggleAuth();
        } else {
            const data = JSON.parse(localStorage.getItem(id));
            if(data && data.pw === pw) {
                currentUser = data.name + data.num;
                showList();
            } else { alert("오류!"); }
        }
    }

    function showList() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('header-title').innerText = "채팅 목록";
    }

    function enterChat(name, type) {
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'inline';
        document.getElementById('header-title').innerText = name;
        document.getElementById('messages').innerHTML = ""; // 방 들어올 때 초기화 (예시)
    }

    function sendText() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        addBubble(currentUser + ": " + input.value, 'outgoing');
        input.value = "";
    }

    function sendImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgTag = `<img src="${e.target.result}" class="img-msg">`;
                addBubble(currentUser + ": " + imgTag, 'outgoing');
            };
            reader.readAsDataURL(file);
        }
    }

    function addBubble(content, type) {
        const div = document.createElement('div');
        div.className = "bubble " + type;
        div.innerHTML = content;
        const msgs = document.getElementById('messages');
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }
</script>
</body>
</html>
