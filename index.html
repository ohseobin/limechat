<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lime Chat</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 채팅창 스타일 */
        #chat-box { display: none; flex-direction: column; height: 500px; text-align: left; }
        #messages { flex: 1; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #fafafa; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; background: #e1ffc7; width: fit-content; max-width: 80%; }
        .my-msg { background: #fff; border: 1px solid #ddd; align-self: flex-end; margin-left: auto; }
    </style>
</head>
<body>

<div class="card" id="auth-area">
    <h1 id="title">Lime Chat 로그인</h1>
    <div id="reg-fields" style="display:none">
        <input type="text" id="school" placeholder="학교">
        <input type="number" id="grade" placeholder="학년" style="width:30%">
        <input type="number" id="class" placeholder="반" style="width:30%">
        <input type="number" id="num" placeholder="번호" style="width:30%">
        <input type="text" id="name" placeholder="이름">
    </div>
    <input type="text" id="uid" placeholder="아이디">
    <input type="password" id="upw" placeholder="비밀번호">
    <button onclick="handleAuth()" id="btn-text">로그인</button>
    <p style="font-size:12px; color:gray; cursor:pointer; text-decoration:underline;" onclick="toggle()">회원가입 하기</p>
</div>

<div class="card" id="chat-box">
    <h2 id="user-info" style="font-size:16px; color:#2ecc71;"></h2>
    <div id="messages"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="msg-input" placeholder="메시지 입력..." style="margin:0;">
        <button onclick="sendMsg()" style="width:60px; margin:0;">전송</button>
    </div>
    <button onclick="location.reload()" style="background:#888; margin-top:10px;">로그아웃</button>
</div>

<script>
    let isReg = false;
    let currentUser = "";

    function toggle() {
        isReg = !isReg;
        document.getElementById('title').innerText = isReg ? "회원가입" : "로그인";
        document.getElementById('btn-text').innerText = isReg ? "가입하기" : "로그인";
        document.getElementById('reg-fields').style.display = isReg ? "block" : "none";
    }

    function handleAuth() {
        const id = document.getElementById('uid').value;
        const pw = document.getElementById('upw').value;
        if(!id || !pw) return alert("다 입력해줘!");

        if(isReg) {
            const info = { pw, name: document.getElementById('name').value, num: document.getElementById('num').value };
            localStorage.setItem(id, JSON.stringify(info));
            alert("가입 완료! 로그인해봐.");
            toggle();
        } else {
            const data = JSON.parse(localStorage.getItem(id));
            if(data && data.pw === pw) {
                currentUser = data.name + data.num; // 예: 오서빈7
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('chat-box').style.display = 'flex';
                document.getElementById('user-info').innerText = currentUser + " 접속 중";
            } else { alert("아이디나 비번이 틀려!"); }
        }
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        const msgDiv = document.createElement('div');
        msgDiv.className = "msg my-msg";
        msgDiv.innerText = currentUser + ": " + input.value;
        document.getElementById('messages').appendChild(msgDiv);
        input.value = "";
        // 아래로 자동 스크롤
        const area = document.getElementById('messages');
        area.scrollTop = area.scrollHeight;
    }
</script>
</body>
</html>
