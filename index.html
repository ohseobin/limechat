<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lime Chat</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 350px; text-align: center; }
        h1 { color: #2ecc71; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .social-login { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .social-btn { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; gap: 8px; }
        .btn-github { background: #333; color: white; border: none; }
        .toggle-mode { margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="auth-card">
    <h1 id="title">Lime Chat 로그인</h1>
    <input type="text" id="uid" placeholder="아이디">
    <input type="password" id="upw" placeholder="비밀번호">
    <button class="main-btn" onclick="auth()" id="btn-text">로그인</button>
    <div class="social-login">
        <button class="social-btn" onclick="alert('구글 로그인 준비 중!')">Google 로그인</button>
        <button class="social-btn btn-github" onclick="alert('깃허브 로그인 준비 중!')">GitHub 로그인</button>
    </div>
    <div class="toggle-mode" onclick="toggle()" id="toggle-text">계정이 없으신가요? 회원가입</div>
</div>
<script>
    let isReg = false;
    function toggle() {
        isReg = !isReg;
        document.getElementById('title').innerText = isReg ? "회원가입" : "로그인";
        document.getElementById('btn-text').innerText = isReg ? "가입하기" : "로그인";
        document.getElementById('toggle-text').innerText = isReg ? "이미 계정이 있나요? 로그인" : "계정이 없으신가요? 회원가입";
    }
    function auth() {
        const id = document.getElementById('uid').value;
        const pw = document.getElementById('upw').value;
        if(!id || !pw) return alert("입력해주세요!");
        if(isReg) {
            localStorage.setItem(id, pw);
            alert("가입 성공! 로그인해주세요.");
            toggle();
        } else {
            if(localStorage.getItem(id) === pw) {
                alert(id + "님 환영합니다!");
            } else { alert("정보가 틀려요!"); }
        }
    }
</script>
</body>
</html>
